<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop</title>
        <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/shop.css">
</head>
<body>
      <div class="page-container">
    <header>
    <h1 class="title">Shop</h1>
</header>
    <div class="page-layout">
<ul class="navbar">
  <li class="home"><a href="../index.html">home</a></li>
  <li class="pflink"><a href="../portfolio/index.html">Engineering Portfolio</a></li>
  <li class="shoplink"><a href="../shop/index.html">products</a></li>
  <li class="service"><a href="../services/index.html">services</a></li>
  <li class="contacts"><a href="../contact/index.html">Contact me here</a></li>
</ul>

<div class="sort_container">
    <button id="sortBtn" class="sort-btn">Sort / Filter ▾</button>

    <div id="sortMenu" class="sort-menu">
        <button onclick="filterProducts('all')">Show All</button>
        <h4>Electronics</h4>
        <button onclick="filterProducts('motor_driver')">Motor Drivers</button>
        <button onclick="filterProducts('connectors')">Connectors</button>

        <h4>Crazy Cart Parts</h4>
        <button onclick="filterProducts('steering')">Steering</button>
        <button onclick="filterProducts('battery')">Battery Upgrades</button>
    </div>
</div>

<div class="product_container">
    <a href="hbridgedriver/index.html">
        <div class="product1" data-category="motor_driver">
            <div class="info">
                <h2>H bridge motor driver</h2>
                <p>handmade dual direction motor drivers from 2amp to 20+ amps drivers available! </p>
            </div>
            <img src="hbridgedriver/hbridgedriver.png" alt="H bridge motor driver image">
        </div>
    </a>
</div>
<script>
    document.getElementById("sortBtn").onclick = () => {
    const menu = document.getElementById("sortMenu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
};

function filterProducts(category) {
    const cards = document.querySelectorAll('.product1');

    cards.forEach(card => {
        if (card.dataset.category === category || category === 'all') {
            card.style.display = 'flex';
        } else {
            card.style.display = 'none';
        }
    });

    // Close menu after selecting
    document.getElementById("sortMenu").style.display = "none";
}

document.addEventListener('click', (event) => {
    const menu = document.getElementById('sortMenu');
    const button = document.getElementById('sortBtn');
    if (!button.contains(event.target) && !menu.contains(event.target)) {
        menu.style.display = 'none';
    }
});


</script>
</body>
</html>
