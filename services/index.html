<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop</title>
        <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/services.css">
</head>
<body>
      <div class="page-container">
    <header>
    <h1 class="title">services</h1>
</header>
    <div class="page-layout">
<ul class="navbar">
  <li class="home"><a href="../index.html">home</a></li>
  <li class="pflink"><a href="../portfolio/index.html">Engineering Portfolio</a></li>
  <li class="shoplink"><a href="../shop/index.html">products</a></li>
  <li class="service"><a href="../services/index.html">services</a></li>
  <li class="contacts"><a href="../contact/index.html">Contact me here</a></li>
</ul>

<div class="sort_container">
    <button id="sortBtn" class="sort-btn">Sort / Filter ▾</button>
    <div id="sortMenu" class="sort-menu">
        <button onclick="filterProducts('all')">Show All</button>
        <h4>Services</h4>
        <button onclick="filterProducts('lawn_mowing')">Lawn Mowing</button>
        <button onclick="filterProducts('repair')">Repairs</button>
    </div>
</div>

<div class="services_container">
    <a href="lawn mowing/index.html">
        <div class="service1" data-category="lawn_mowing">
            <div class="info">
                <h2>Lawn Mowing</h2>
                <p>Professional lawn mowing services for your home or business!</p>
            </div>
            <img src="lawn mowing/image.png" alt="Lawn mowing service image">
        </div>
    </a>
</div>

<script>
    document.getElementById("sortBtn").onclick = () => {
    const menu = document.getElementById("sortMenu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
};

function filterProducts(category) {
    const cards = document.querySelectorAll('.service1');

    cards.forEach(card => {
        if (category === 'all' || card.dataset.category === category) {
            card.style.display = 'flex';
        } else {
            card.style.display = 'none';
        }
    });

    document.getElementById("sortMenu").style.display = "none";
}

document.addEventListener('click', (event) => {
    const menu = document.getElementById('sortMenu');
    const button = document.getElementById('sortBtn');
    if (!button.contains(event.target) && !menu.contains(event.target)) {
        menu.style.display = 'none';
    }
});


</script>
</body>
</html>
